<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Matrícula</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 2rem;
    color: #f0f0f0;
  }

  /* HEADER */
  .header {
    width: 100%;
    background: #111;
    border-bottom: 2px solid #2a2a4a;
    padding: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #aaa;
  }
  .score-display {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .score-val {
    font-size: 20px;
    font-weight: 700;
    color: #f5c518;
    font-variant-numeric: tabular-nums;
  }
  .score-label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* PLATE */
  .plate-area {
    margin: 1.5rem auto 1.25rem;
    width: 90%;
    max-width: 340px;
  }

  .plate-wrap {
    background: white;
    border-radius: 8px;
    border: 3px solid #ccc;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.8);
    height: 72px;
  }

  .plate-eu {
    background: #003399;
    width: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    flex-shrink: 0;
  }
  .plate-stars {
    font-size: 9px;
    color: #f5c518;
    letter-spacing: 1px;
    line-height: 1;
  }
  .plate-country {
    font-size: 14px;
    font-weight: 800;
    color: white;
    letter-spacing: 0.05em;
  }

  .plate-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    gap: 14px;
  }

  .plate-number {
    font-family: 'Arial Black', 'Arial', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: #111;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
  }

  .plate-letters {
    font-family: 'Arial Black', 'Arial', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: #111;
    letter-spacing: 0.08em;
    display: flex;
    gap: 2px;
  }

  .plate-letter {
    display: inline-block;
    transition: color 0.15s, transform 0.15s;
  }
  .plate-letter.found {
    color: #1a6b1a;
  }

  .plate-divider {
    width: 2px;
    background: #ccc;
    height: 60%;
    align-self: center;
    flex-shrink: 0;
  }

  /* INFO ROW */
  .info-row {
    width: 90%;
    max-width: 340px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .info-pill {
    font-size: 12px;
    color: #888;
    background: #1e1e3a;
    border: 1px solid #2a2a4a;
    border-radius: 20px;
    padding: 4px 10px;
  }
  .info-pill span {
    color: #f5c518;
    font-weight: 600;
  }

  /* INPUT AREA */
  .input-area {
    width: 90%;
    max-width: 340px;
    margin-bottom: 1rem;
  }

  .word-input-wrap {
    position: relative;
  }

  .word-input {
    width: 100%;
    font-size: 24px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.06em;
    padding: 14px 52px 14px 16px;
    background: #111;
    border: 2px solid #2a2a4a;
    border-radius: 10px;
    color: white;
    text-transform: lowercase;
    outline: none;
    transition: border-color 0.15s;
    caret-color: #f5c518;
  }
  .word-input:focus {
    border-color: #4444aa;
  }
  .word-input.valid {
    border-color: #2a7a2a;
    color: #7fff7f;
  }
  .word-input.invalid {
    border-color: #7a2a2a;
    color: #ff9f9f;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .send-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: #4444aa;
    border: none;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:active { transform: translateY(-50%) scale(0.92); }
  .send-btn:hover { background: #5555cc; }
  .send-btn:disabled { background: #333; cursor: default; }

  /* LETTER PREVIEW */
  .letter-preview {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
    min-height: 28px;
  }
  .lp-char {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    background: #1e1e3a;
    border: 1px solid #2a2a4a;
    color: #555;
    transition: all 0.1s;
  }
  .lp-char.target {
    background: #2a2a5a;
    border-color: #5555aa;
    color: #aaaaff;
  }
  .lp-char.found {
    background: #1a4a1a;
    border-color: #3a8a3a;
    color: #7fff7f;
  }

  /* FEEDBACK */
  .feedback {
    min-height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #888;
    text-align: center;
    padding: 0 1rem;
    transition: all 0.2s;
  }
  .feedback.ok { color: #7fff7f; font-weight: 600; }
  .feedback.err { color: #ff9f9f; }

  /* SCORE ANIMATION */
  .score-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: 900;
    color: #f5c518;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    text-shadow: 0 0 20px rgba(245,197,24,0.5);
    z-index: 100;
  }
  .score-popup.show {
    opacity: 1;
    animation: popUp 1.2s ease forwards;
  }
  @keyframes popUp {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
    70% { opacity: 1; transform: translate(-50%, -70%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -90%) scale(0.9); }
  }

  /* USED WORDS */
  .used-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #555;
    margin-bottom: 8px;
    width: 90%;
    max-width: 340px;
  }
  .used-list {
    width: 90%;
    max-width: 340px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .used-word {
    background: #1e1e3a;
    border: 1px solid #2a2a4a;
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 13px;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .used-pts {
    color: #f5c518;
    font-weight: 700;
    font-size: 11px;
  }

  /* NEW ROUND BTN */
  .new-round-btn {
    margin-top: 1.5rem;
    background: #2a2a5a;
    border: 1px solid #4444aa;
    border-radius: 10px;
    padding: 12px 24px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.03em;
  }
  .new-round-btn:hover { background: #3a3a7a; }

  /* LOADING */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 1rem;
    color: #666;
    font-size: 15px;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #2a2a4a;
    border-top-color: #4444aa;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="loading-screen" id="loader">
  <div class="spinner"></div>
  <div>Cargando diccionario…</div>
</div>

<div id="game" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;">

  <div class="header">
    <div class="header-title">Matrícula</div>
    <div class="score-display">
      <div>
        <div class="score-label">Puntos</div>
        <div class="score-val" id="total-score">0</div>
      </div>
    </div>
  </div>

  <div class="plate-area">
    <div class="plate-wrap">
      <div class="plate-eu">
        <div class="plate-stars">★★★★★★★</div>
        <div class="plate-country">E</div>
      </div>
      <div class="plate-content">
        <div class="plate-number" id="plate-num">0000</div>
        <div class="plate-divider"></div>
        <div class="plate-letters" id="plate-letters">
          <span class="plate-letter" id="pl0">M</span>
          <span class="plate-letter" id="pl1">E</span>
          <span class="plate-letter" id="pl2">T</span>
        </div>
      </div>
    </div>
  </div>

  <div class="info-row">
    <div class="info-pill">Palabras posibles: <span id="possible-count">—</span></div>
    <div class="info-pill">Encontradas: <span id="found-count">0</span></div>
  </div>

  <div class="input-area">
    <div class="word-input-wrap">
      <input
        type="text"
        class="word-input"
        id="word-input"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        placeholder="escribe una palabra…"
      />
      <button class="send-btn" id="send-btn" disabled>→</button>
    </div>
    <div class="letter-preview" id="letter-preview"></div>
  </div>

  <div class="feedback" id="feedback">Las letras deben aparecer en este orden en tu palabra</div>

  <div class="used-title" id="used-title" style="display:none">Palabras encontradas</div>
  <div class="used-list" id="used-list"></div>

  <button class="new-round-btn" id="new-round-btn" onclick="newRound()">Nueva matrícula</button>

</div>

<div class="score-popup" id="score-popup"></div>

  a:1,e:1,o:1,s:1,i:1,u:1,n:1,l:1,r:1,t:1,
  d:2,g:2,b:3,c:3,m:3,p:3,f:4,h:4,v:4,y:4,
  j:6,k:8,ñ:8,q:8,w:8,x:8,z:8
};

let dictionary = [];
let currentLetters = [];
let currentWords = [];
let usedWords = new Set();
let totalScore = 0;

function normalize(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function hasSubseq(text, letters) {
  let li = 0;
  for (let ci = 0; ci < text.length && li < letters.length; ci++) {
    if (text[ci] === letters[li]) li++;
  }
  return li === letters.length;
}

function scoreWord(word) {
  return [...word].reduce((s, c) => s + (SCRABBLE[c] || 0), 0);
}

const DICT_B64=DICT_CHUNKS.join("");


async function loadDictionary() {
  try {
    const compressed = Uint8Array.from(atob(DICT_B64), c => c.charCodeAt(0));
    const ds = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    writer.write(compressed);
    writer.close();
    const reader = ds.readable.getReader();
    const chunks = [];
    while(true) {
      const {done, value} = await reader.read();
      if(done) break;
      chunks.push(value);
    }
    const text = new TextDecoder().decode(new Uint8Array(chunks.flatMap(c=>[...c])));
    dictionary = text.split('
').map(line => {
      const [n,w,p] = line.split('|');
      return [n, w, parseInt(p)];
    });
    document.getElementById('loader').style.display = 'none';
    document.getElementById('game').classList.remove('hidden');
    newRound();
  } catch(e) {
    console.error(e);
    document.querySelector('.loading-screen div:last-child').textContent = 'Error cargando diccionario.';
  }
}
 catch(e) {
    document.querySelector('.loading-screen div:last-child').textContent = 'Error cargando diccionario.';
  }
}

function pickPlate() {
  const FORBIDDEN = ['ñ','q','x','w','k','ch','ll','rr','b','v'];
  const ALLOWED = 'ABCDEFGHIJLMNOPRSTUZ'.split('');
  let letters;
  let found;
  let attempts = 0;
  do {
    letters = [];
    const pool = [...ALLOWED];
    for (let i = 0; i < 3; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      letters.push(pool[idx].toLowerCase());
      pool.splice(idx, 1);
    }
    found = dictionary.filter(([norm]) => hasSubseq(norm, letters));
    attempts++;
  } while ((found.length < 3 || found.length > 9999) && attempts < 100);
  return { letters, found };
}

function newRound() {
  usedWords = new Set();
  document.getElementById('found-count').textContent = '0';
  document.getElementById('used-list').innerHTML = '';
  document.getElementById('used-title').style.display = 'none';
  document.getElementById('feedback').textContent = 'Las letras deben aparecer en este orden en tu palabra';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('word-input').value = '';
  document.getElementById('word-input').className = 'word-input';
  document.getElementById('letter-preview').innerHTML = '';

  const { letters, found } = pickPlate();
  currentLetters = letters;
  currentWords = found;

  const num = String(found.length).padStart(4, '0');
  document.getElementById('plate-num').textContent = num;
  document.getElementById('possible-count').textContent = found.length;

  ['pl0','pl1','pl2'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.textContent = letters[i].toUpperCase();
    el.className = 'plate-letter';
  });

  document.getElementById('word-input').focus();
}

function updatePreview(val) {
  const norm = normalize(val);
  const preview = document.getElementById('letter-preview');
  preview.innerHTML = '';

  if (!val) return;

  let li = 0;
  const foundAt = [];
  for (let ci = 0; ci < norm.length; ci++) {
    if (li < currentLetters.length && norm[ci] === currentLetters[li]) {
      foundAt.push(ci);
      li++;
    }
  }

  for (let ci = 0; ci < val.length && ci < 20; ci++) {
    const span = document.createElement('div');
    span.className = 'lp-char';
    span.textContent = val[ci].toUpperCase();
    if (foundAt.includes(ci)) span.classList.add('found');
    else {
      for (let l of currentLetters) {
        if (normalize(val[ci]) === l) { span.classList.add('target'); break; }
      }
    }
    preview.appendChild(span);
  }

  ['pl0','pl1','pl2'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'plate-letter' + (i < li ? ' found' : '');
  });
}

function submitWord() {
  const input = document.getElementById('word-input');
  const val = input.value.trim().toLowerCase();
  const norm = normalize(val);
  const fb = document.getElementById('feedback');

  if (!val) return;

  if (usedWords.has(val)) {
    fb.textContent = 'Ya usaste esa palabra.';
    fb.className = 'feedback err';
    input.className = 'word-input invalid';
    setTimeout(() => { input.className = 'word-input'; }, 600);
    return;
  }

  if (!hasSubseq(norm, currentLetters)) {
    fb.textContent = `Las letras ${currentLetters.map(l=>l.toUpperCase()).join('-')} deben aparecer en orden.`;
    fb.className = 'feedback err';
    input.className = 'word-input invalid';
    setTimeout(() => { input.className = 'word-input'; }, 600);
    return;
  }

  const match = dictionary.find(([n]) => n === norm);
  if (!match) {
    fb.textContent = 'Palabra no encontrada en el diccionario.';
    fb.className = 'feedback err';
    input.className = 'word-input invalid';
    setTimeout(() => { input.className = 'word-input'; }, 600);
    return;
  }

  const [, originalWord, pts] = match;
  usedWords.add(val);
  totalScore += pts;

  document.getElementById('total-score').textContent = totalScore;
  document.getElementById('found-count').textContent = usedWords.size;

  const popup = document.getElementById('score-popup');
  popup.textContent = '+' + pts;
  popup.className = 'score-popup';
  void popup.offsetWidth;
  popup.className = 'score-popup show';

  const tag = document.createElement('div');
  tag.className = 'used-word';
  tag.innerHTML = `${originalWord} <span class="used-pts">+${pts}</span>`;
  document.getElementById('used-list').prepend(tag);
  document.getElementById('used-title').style.display = 'block';

  fb.textContent = `¡Bien! ${originalWord} → ${pts} punto${pts !== 1 ? 's' : ''}`;
  fb.className = 'feedback ok';

  input.className = 'word-input valid';
  input.value = '';
  document.getElementById('letter-preview').innerHTML = '';
  ['pl0','pl1','pl2'].forEach(id => document.getElementById(id).className = 'plate-letter');

  setTimeout(() => {
    input.className = 'word-input';
    fb.className = 'feedback';
    fb.textContent = 'Sigue buscando palabras con estas letras';
  }, 1500);

  input.focus();
}

document.getElementById('word-input').addEventListener('input', e => {
  const val = e.target.value;
  document.getElementById('send-btn').disabled = val.trim().length < 3;
  updatePreview(val);
  document.getElementById('word-input').className = 'word-input';
});

document.getElementById('word-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitWord();
});

document.getElementById('send-btn').addEventListener('click', submitWord);

loadDictionary();
</script>
